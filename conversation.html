<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rev-N-Rip | Conversation</title>
<style>
:root{
  --bg:#090511;
  --bg-2:#0e0718;
  --panel:rgba(15,10,27,.78);
  --panel-2:rgba(255,255,255,.04);
  --line:rgba(255,255,255,.10);
  --text:#f9f6ff;
  --muted:#d3c7e5;
  --purple:#7b33ff;
  --magenta:#ff2f98;
  --gold:#ffb34d;
  --cyan:#6ae6ff;
  --red:#d71f1f;
  --red2:#ff8e52;
  --radius:28px;
  --shadow:0 24px 80px rgba(0,0,0,.42);
  --glow:0 0 0 1px rgba(255,255,255,.04),0 20px 60px rgba(0,0,0,.35),0 0 34px rgba(123,51,255,.16);
  --max:1240px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;color:var(--text);font-family:Inter,Arial,Helvetica,sans-serif;background:
 radial-gradient(circle at 10% 5%, rgba(123,51,255,.16), transparent 25%),
 radial-gradient(circle at 88% 10%, rgba(255,47,152,.10), transparent 28%),
 linear-gradient(180deg, #05020b, #090511 50%, #05020b);overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(255,255,255,.024) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.024) 1px, transparent 1px);background-size:42px 42px;opacity:.22;pointer-events:none}
body.red-theme{background:radial-gradient(circle at 18% 9%, rgba(215,31,31,.15), transparent 22%),radial-gradient(circle at 85% 12%, rgba(255,142,82,.08), transparent 18%),linear-gradient(180deg,#050203,#0b0305 52%,#050203)}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.wrap{width:min(var(--max), calc(100% - 28px));margin:0 auto}
.topbar{position:sticky;top:10px;z-index:90;width:min(var(--max), calc(100% - 24px));margin:10px auto 0;display:flex;justify-content:space-between;align-items:center;gap:14px;padding:14px 16px;border-radius:22px;background:rgba(9,7,18,.72);backdrop-filter:blur(16px);border:1px solid var(--line);box-shadow:var(--glow)}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand-mark{width:260px;max-width:min(42vw,260px);height:auto;border-radius:0;background:none;display:block;box-shadow:none;overflow:visible}
.brand-mark img{width:100%;height:auto;object-fit:contain;display:block;filter:drop-shadow(0 10px 24px rgba(0,0,0,.36))}
.brand-logo-link{display:flex;align-items:center}
.footer-brand{margin:0 auto 14px;max-width:min(80vw,340px)}
.hero-corner-logo{position:absolute;right:26px;top:22px;z-index:1;width:min(32vw,300px);height:auto;opacity:.92;filter:drop-shadow(0 12px 34px rgba(0,0,0,.44));pointer-events:none}
.brand-name{font-size:20px;font-weight:900;letter-spacing:-.04em;white-space:nowrap}
.brand-sub{display:block;font-size:11px;letter-spacing:.17em;text-transform:uppercase;color:#e9cdec;margin-top:2px}
.nav{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px}
.nav a{padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));color:#faeafd;font-size:14px;transition:.18s ease}
.nav a:hover{transform:translateY(-1px);box-shadow:0 0 18px rgba(255,47,152,.15);border-color:rgba(255,255,255,.16)}
.nav a.primary{border:0;background:linear-gradient(135deg,var(--purple),var(--magenta),var(--gold));font-weight:900;color:#fff;box-shadow:0 12px 28px rgba(255,47,152,.22)}
.hero{padding-top:48px}
.hero-shell{min-height:720px;position:relative;overflow:hidden;border-radius:34px;border:1px solid rgba(255,255,255,.08);box-shadow:var(--glow);background-size:cover;background-position:center;background-repeat:no-repeat}
.hero-shell::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg, rgba(3,2,10,.92) 0%, rgba(8,5,17,.80) 34%, rgba(10,6,18,.40) 64%, rgba(10,6,18,.14) 100%)}
.red-theme .hero-shell::before{background:linear-gradient(90deg, rgba(4,1,2,.94) 0%, rgba(8,2,4,.86) 40%, rgba(10,3,4,.44) 72%, rgba(10,3,4,.16) 100%)}
.hero-content{position:relative;z-index:1;max-width:760px;padding:58px 48px}
.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.05);font-size:12px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#ffe4f6}
.eyebrow::before{content:"";width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--magenta),var(--gold));box-shadow:0 0 14px rgba(255,47,152,.5)}
.red-theme .eyebrow::before{background:linear-gradient(135deg,var(--red),var(--red2));box-shadow:0 0 14px rgba(215,31,31,.5)}
h1,h2,h3,h4{margin:0;line-height:.96;letter-spacing:-.045em}
h1{font-size:clamp(42px, 7vw, 86px);margin:18px 0}
h2{font-size:clamp(32px, 5vw, 56px)}
h3{font-size:24px}
p{line-height:1.7;color:var(--muted);margin:0}
.hero p{font-size:18px;max-width:640px;color:#e7dbf1}
.gradient-text{background:linear-gradient(135deg,#fff 0%, #ffe1f5 36%, var(--gold) 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.red-theme .gradient-text{background:linear-gradient(135deg,#fff 0%, #ffd0d0 34%, #ffb265 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:28px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:52px;padding:14px 22px;border-radius:999px;border:0;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--purple),var(--magenta),var(--gold));box-shadow:0 12px 28px rgba(255,47,152,.28), inset 0 1px 0 rgba(255,255,255,.18);transition:.18s ease}
.btn:hover{transform:translateY(-2px)}
.btn.secondary{background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.10);box-shadow:0 8px 18px rgba(0,0,0,.20)}
.red-theme .btn{background:linear-gradient(135deg,var(--red), #a31010, var(--red2))}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:32px}
.stat{padding:16px;border-radius:20px;background:rgba(8,6,18,.42);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px)}
.stat strong{display:block;font-size:24px;margin-bottom:4px}
.stat span{font-size:13px;color:#f0cae8}
.section{padding:78px 0;scroll-margin-top:90px}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:22px;margin-bottom:26px}
.section-head p{max-width:560px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.card{background:linear-gradient(180deg, rgba(16,11,28,.78), rgba(11,8,21,.60));border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);box-shadow:var(--glow);backdrop-filter:blur(14px)}
.card-pad{padding:22px}
.showcase{min-height:420px;padding:34px;overflow:hidden;position:relative;background-size:cover;background-position:center;border-radius:28px}
.showcase::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg, rgba(10,6,18,.88) 0%, rgba(10,6,18,.52) 54%, rgba(10,6,18,.18) 100%)}
.red-theme .showcase::before{background:linear-gradient(90deg, rgba(8,2,4,.92) 0%, rgba(8,2,4,.62) 54%, rgba(8,2,4,.20) 100%)}
.showcase>*{position:relative;z-index:1}
.showcase h3{font-size:clamp(34px,4vw,54px);max-width:540px}
.feature-list{display:grid;gap:14px}
.feature{padding:18px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.market-grid{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start}
.sidebar{position:sticky;top:94px}
.search{width:100%;padding:14px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;outline:none}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.chip{padding:9px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);cursor:pointer;font-size:13px;font-weight:800;color:#f3dcfc}
.chip.active{background:linear-gradient(135deg, rgba(123,51,255,.42), rgba(255,47,152,.26), rgba(255,179,77,.18));border-color:rgba(255,255,255,.14)}
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.product{overflow:hidden}
.product-media{height:220px;background:linear-gradient(135deg, rgba(14,10,28,.95), rgba(20,10,34,.82));border-bottom:1px solid rgba(255,255,255,.08);overflow:hidden}
.product-media img{width:100%;height:100%;object-fit:cover}
.product-body{padding:18px}
.meta-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.meta{font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:#ffd7ee;font-weight:800}
.price{font-size:26px;font-weight:900;color:#fff}
.product p{font-size:14px;min-height:72px;margin-top:8px}
.product-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.board{display:grid;grid-template-columns:1fr 360px;gap:20px}
.progress{height:14px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08);margin:16px 0 22px}
.progress>span{display:block;height:100%;width:68%;background:linear-gradient(90deg,var(--purple),var(--magenta),var(--gold))}
.red-theme .progress>span{background:linear-gradient(90deg,var(--red), #a31010, var(--red2))}
.pack-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.pack{min-height:56px;display:grid;place-items:center;border-radius:16px;font-weight:900;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04)}
.pack.filled{background:linear-gradient(135deg, rgba(123,51,255,.74), rgba(255,47,152,.58), rgba(255,179,77,.52))}
.note{padding:18px;border-left:4px solid rgba(255,179,77,.65);background:rgba(255,255,255,.04);border-radius:18px}
.timeline{display:grid;gap:14px}
.tl{display:grid;grid-template-columns:90px 1fr;gap:16px;align-items:start;padding:16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.tl strong{font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:#ffd7ee}
.archive-card{padding:18px}
.archive-top{display:flex;gap:14px;align-items:center;margin-bottom:14px}
.archive-badge{width:58px;height:58px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg, rgba(110,8,8,.72), rgba(215,31,31,.44), rgba(255,142,82,.24));font-size:26px}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.tag{padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#ffdce9;font-weight:800}
.market-row{display:grid;grid-template-columns:1.1fr 1fr auto;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.bar{height:12px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08)}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--purple),var(--magenta),var(--gold))}
.red-theme .bar>span{background:linear-gradient(90deg,var(--red), #a31010, var(--red2))}
.cta-band{padding:26px;border-radius:28px;background:linear-gradient(135deg, rgba(123,51,255,.22), rgba(255,47,152,.12), rgba(255,179,77,.08));border:1px solid rgba(255,255,255,.08);box-shadow:var(--glow)}
.contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.footer{padding:38px 0 48px;text-align:center;color:#e8c9df}
.footer .brand-mark{margin:0 auto 14px}
.small{font-size:13px}
@media (max-width:1100px){.stats,.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3,.grid-2,.market-grid,.board,.contact-grid{grid-template-columns:1fr}.product-grid{grid-template-columns:repeat(2,1fr)}.sidebar{position:static}}
@media (max-width:860px){.topbar{top:0;width:100%;margin:0;border-radius:0 0 22px 22px;flex-direction:column;align-items:flex-start}.nav{width:100%;overflow:auto;white-space:nowrap;flex-wrap:nowrap;justify-content:flex-start;padding-bottom:4px}.hero{padding-top:22px}.hero-shell{min-height:auto;border-radius:26px}.hero-content{padding:34px 22px;max-width:100%}.hero p{font-size:16px}.stats,.product-grid,.grid-3,.grid-4,.contact-grid{grid-template-columns:1fr}.section{padding:56px 0}.section-head{display:block}.section-head p{margin-top:10px}.product-actions{grid-template-columns:1fr}.pack-grid{grid-template-columns:repeat(3,1fr)}.market-row{grid-template-columns:1fr}.actions{display:grid;grid-template-columns:1fr}.btn{width:100%}}
@media (max-width:420px){.wrap{width:min(100% - 20px, var(--max))}.pack-grid{grid-template-columns:repeat(2,1fr)}.brand-mark{max-width:min(60vw,190px)}.hero-corner-logo{width:min(46vw,220px)}}

/* Premium badge/logo accent update */
.brand-logo-link{display:flex;align-items:center}

.btn.secondary::before{background-color:rgba(255,255,255,.04)}

.cta-band{position:relative;overflow:hidden}

.note{position:relative;overflow:hidden}

  .topbar .brand-mark{width:min(72vw,260px);max-width:min(72vw,260px);padding:8px 12px}

/* Homepage hero refinement patch */
.homepage-hero{min-height:780px;background-position:center right}
.homepage-hero::before{background:linear-gradient(90deg, rgba(4,2,10,.94) 0%, rgba(8,5,18,.90) 20%, rgba(11,6,22,.72) 42%, rgba(11,6,22,.36) 64%, rgba(11,6,22,.18) 100%),radial-gradient(circle at 24% 52%, rgba(8,4,18,.52), transparent 44%),linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.14));}
.homepage-hero::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg, rgba(255,255,255,.03), transparent 18%, transparent 80%, rgba(0,0,0,.14));}
.hero-grid{position:relative;z-index:1;display:grid;grid-template-columns:minmax(0,730px) 300px;gap:22px;align-items:end;min-height:780px;padding:44px;}
.hero-panel{max-width:none;padding:28px 30px;border-radius:32px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(180deg, rgba(15,10,28,.80), rgba(9,7,18,.68));backdrop-filter:blur(14px);box-shadow:0 24px 60px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.06), 0 0 24px rgba(255,47,152,.08);align-self:end;margin-bottom:10px}
.hero-panel h1{max-width:16ch}
.hero-panel p{max-width:59ch;color:#f0e6f8}
.hero-utility-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.hero-chip{padding:9px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.05);color:#f9e8ff;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
.hero-microcopy{margin-top:12px;color:#d8cae8;font-size:13px}
.hero-floating-stack{display:grid;gap:14px;align-self:end;margin-bottom:10px}
.floating-card{padding:18px;border-radius:24px;border:1px solid rgba(255,255,255,.10);background:linear-gradient(180deg, rgba(18,12,32,.82), rgba(11,8,21,.68));backdrop-filter:blur(14px);box-shadow:0 20px 54px rgba(0,0,0,.28), 0 0 24px rgba(123,51,255,.08)}
.floating-card h3{font-size:22px;line-height:1.02;margin:6px 0 8px}
.floating-card p{font-size:14px;color:#eadbf4}
.mini-kicker{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:900;color:#ffd3ee}
.floating-list{display:grid;gap:10px;margin-top:12px}
.floating-item{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;color:#ecdff8}
.floating-item:last-child{border-bottom:0;padding-bottom:0}
.market-glow-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:22px}
.market-glow-tile{padding:16px;border-radius:20px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));box-shadow:0 10px 28px rgba(0,0,0,.18)}

/* Animated mailing list giveaway popup */
.mail-pop-overlay{
  position:fixed;
  inset:0;
  z-index:5000;
  display:none;
  align-items:center;
  justify-content:center;
  padding:22px;
  background:
    radial-gradient(circle at 20% 12%, rgba(255,47,152,.20), transparent 30%),
    radial-gradient(circle at 82% 18%, rgba(255,179,77,.14), transparent 28%),
    rgba(0,0,0,.72);
  backdrop-filter:blur(12px);
}
.mail-pop-overlay.show{display:flex;animation:mailFadeIn .34s ease both}
.mail-pop{
  width:min(840px,100%);
  position:relative;
  overflow:hidden;
  border-radius:36px;
  border:1px solid rgba(255,255,255,.14);
  background:
    linear-gradient(135deg, rgba(123,51,255,.16), rgba(255,47,152,.10), rgba(255,179,77,.08)),
    linear-gradient(180deg, rgba(16,11,28,.96), rgba(8,6,18,.92));
  box-shadow:0 36px 110px rgba(0,0,0,.62),0 0 44px rgba(255,47,152,.18),inset 0 1px 0 rgba(255,255,255,.10);
  transform-origin:center;
  animation:mailPopIn .42s cubic-bezier(.2,1.1,.2,1) both;
}
.mail-pop::before{content:"";position:absolute;inset:-2px;background:linear-gradient(115deg, transparent 0%, rgba(255,255,255,.10) 28%, transparent 48%),radial-gradient(circle at 80% 8%, rgba(255,179,77,.18), transparent 28%);pointer-events:none}
.mail-pop::after{content:"";position:absolute;right:-70px;bottom:-70px;width:230px;height:230px;border-radius:50%;background:radial-gradient(circle, rgba(255,47,152,.16), transparent 70%);pointer-events:none}
.mail-pop-inner{position:relative;z-index:1;display:grid;grid-template-columns:1.08fr .92fr;gap:0}
.mail-pop-content{padding:34px}
.mail-pop-visual{min-height:100%;padding:26px;display:grid;place-items:center;background:radial-gradient(circle at center, rgba(255,179,77,.12), transparent 45%),rgba(255,255,255,.035);border-left:1px solid rgba(255,255,255,.08)}
.mail-pop-badge{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#ffe4f6;font-size:12px;font-weight:950;letter-spacing:.13em;text-transform:uppercase}
.mail-pop-logo-wrap{display:flex;align-items:center;gap:12px;margin:16px 0 6px}
.mail-pop-logo-mark{position:relative;width:82px;height:82px;display:grid;place-items:center;flex:0 0 auto}
.mail-pop-logo-mark::before{content:"";position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle, rgba(255,47,152,.22), transparent 65%);animation:logoPulse 2.8s ease-in-out infinite}
.mail-pop-logo-mark img{position:relative;max-width:100%;max-height:100%;filter:drop-shadow(0 0 22px rgba(255,255,255,.12)) drop-shadow(0 0 14px rgba(255,47,152,.24));animation:logoFloat 3.4s ease-in-out infinite}
.mail-pop-logo-text{font-size:13px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:#ffcf8a}
.mail-pop h2{margin:10px 0 10px;font-size:clamp(34px,5vw,58px);line-height:.96}
.mail-pop p{color:#eadff7}
.mail-pop-form{display:grid;gap:12px;margin-top:20px}
.mail-pop-form input{width:100%;padding:15px 16px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;outline:none}
.mail-pop-form input::placeholder{color:rgba(255,255,255,.52)}
.mail-pop-perks{display:grid;gap:10px;margin-top:18px}
.mail-pop-perk{display:flex;gap:10px;align-items:flex-start;color:#f1e6f8;font-size:14px}
.mail-pop-perk span{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;background:linear-gradient(135deg,var(--purple),var(--magenta),var(--gold))}
.mail-pop-card{width:100%;max-width:300px;aspect-ratio:3/4;border-radius:28px;border:1px solid rgba(255,255,255,.12);background:radial-gradient(circle at 30% 14%, rgba(255,255,255,.18), transparent 22%),linear-gradient(145deg, rgba(123,51,255,.42), rgba(255,47,152,.32), rgba(255,179,77,.22));box-shadow:0 24px 70px rgba(0,0,0,.44), 0 0 32px rgba(255,47,152,.18);display:grid;place-items:center;text-align:center;padding:26px;position:relative;overflow:hidden}
.mail-pop-card::before{content:"";position:absolute;inset:-40%;background:conic-gradient(from 0deg, transparent 0 70%, rgba(255,255,255,.18) 75%, transparent 80% 100%);animation:glintSpin 6s linear infinite}
.mail-pop-card img{position:relative;z-index:1;max-width:72%;height:auto;filter:drop-shadow(0 0 22px rgba(255,255,255,.14));animation:logoFloat 3.1s ease-in-out infinite}
.mail-pop-card strong{position:relative;z-index:1;display:block;font-size:28px;line-height:1;color:#fff;margin-top:14px}
.mail-pop-card span{position:relative;z-index:1;display:block;margin-top:10px;color:#fff2cc;font-weight:950;letter-spacing:.12em;text-transform:uppercase;font-size:12px}
.mail-pop-close{position:absolute;top:16px;right:16px;z-index:3;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;font-size:26px;line-height:1;cursor:pointer}
.mail-pop-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:6px}
.mail-pop-skip{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:12px 16px;font-weight:900;cursor:pointer}
.mail-pop-small{margin-top:6px;font-size:12px;color:#cfc1da}
.mail-pop-status{display:none;margin-top:12px;padding:12px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);color:#ffe4f6;font-weight:800}
.mail-pop-status.show{display:block}
.mail-pop-status.success{background:rgba(90,255,166,.08);border-color:rgba(90,255,166,.22)}
.mail-pop-status.error{background:rgba(255,90,120,.08);border-color:rgba(255,90,120,.26)}
@keyframes mailFadeIn{from{opacity:0}to{opacity:1}}
@keyframes mailPopIn{from{opacity:0;transform:translateY(20px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Modern Featured Drop section */
.featured-drop-modern{
  position:relative;
  overflow:hidden;
}
.featured-drop-shell{
  display:grid;
  grid-template-columns:1.25fr .75fr;
  gap:20px;
  align-items:stretch;
}
.featured-drop-main{
  position:relative;
  min-height:440px;
  overflow:hidden;
  border-radius:36px;
  border:1px solid rgba(255,255,255,.10);
  background:
    linear-gradient(90deg, rgba(5,3,12,.92), rgba(10,5,20,.62), rgba(10,5,20,.18)),
    var(--drop-img) center/cover no-repeat;
  box-shadow:var(--glow);
}
.featured-drop-main::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 18% 18%, rgba(255,47,152,.16), transparent 30%),
    linear-gradient(180deg, transparent 42%, rgba(5,3,12,.84));
  pointer-events:none;
}
.featured-drop-content{
  position:relative;
  z-index:1;
  max-width:620px;
  padding:34px;
  min-height:440px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.featured-drop-badge-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}
.featured-drop-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:9px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.07);
  color:#ffe8f8;
  font-size:12px;
  font-weight:950;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.featured-drop-content h2{
  font-size:clamp(38px,5.5vw,74px);
  line-height:.94;
  margin-bottom:14px;
}
.featured-drop-content p{
  max-width:560px;
  font-size:17px;
}
.featured-drop-meta{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:24px;
}
.featured-drop-stat{
  padding:14px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.055);
  backdrop-filter:blur(10px);
}
.featured-drop-stat strong{
  display:block;
  color:#fff;
  font-size:22px;
  line-height:1;
}
.featured-drop-stat span{
  display:block;
  margin-top:6px;
  color:#ffcf8a;
  font-size:11px;
  font-weight:950;
  letter-spacing:.10em;
  text-transform:uppercase;
}
.featured-drop-actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:24px;
}
.featured-drop-side{
  display:grid;
  gap:20px;
}
.featured-mini-drop{
  position:relative;
  overflow:hidden;
  min-height:210px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,.10);
  background:
    linear-gradient(180deg, rgba(12,7,24,.78), rgba(6,4,14,.88)),
    var(--mini-img) center/cover no-repeat;
  box-shadow:var(--glow);
  display:flex;
  align-items:flex-end;
}
.featured-mini-drop::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 78% 12%, rgba(255,179,77,.13), transparent 34%),
    linear-gradient(180deg, rgba(5,3,12,.18), rgba(5,3,12,.88));
}
.featured-mini-body{
  position:relative;
  z-index:1;
  padding:22px;
}
.featured-mini-body h3{
  font-size:26px;
  margin-bottom:8px;
}
.featured-mini-body p{
  font-size:14px;
}
.featured-mini-link{
  display:inline-flex;
  margin-top:14px;
  color:#ffcf8a;
  font-size:12px;
  font-weight:950;
  letter-spacing:.10em;
  text-transform:uppercase;
}
@media(max-width:1050px){
  .featured-drop-shell{grid-template-columns:1fr}
  .featured-drop-side{grid-template-columns:1fr 1fr}
}
@media(max-width:720px){
  .featured-drop-content{padding:24px;min-height:420px}
  .featured-drop-meta{grid-template-columns:1fr}
  .featured-drop-side{grid-template-columns:1fr}
}


/* Viral TCG community hooks */
.viral-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.viral-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.viral-card{
  position:relative;
  overflow:hidden;
  padding:24px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 12% 0%, rgba(255,47,152,.12), transparent 34%),

  box-shadow:var(--glow);
}
.viral-card.gold{

    radial-gradient(circle at 88% 0%, rgba(255,179,77,.14), transparent 34%),

}
.viral-card.red{

    radial-gradient(circle at 50% 0%, rgba(215,31,31,.18), transparent 38%),

.viral-card h3{font-size:30px;margin:12px 0 8px}
.viral-card p{font-size:15px}
.viral-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.copy-viral-btn,.download-claim-btn{
  border:0;
  border-radius:999px;
  padding:12px 14px;
  font-weight:950;

}

  border:1px solid rgba(255,255,255,.12);

.bounty-board-2{
  position:relative;
  overflow:hidden;
}
.bounty-list{
  display:grid;
  gap:14px;
}
.bounty-item{
  display:grid;
  grid-template-columns:1fr auto;
  gap:16px;
  align-items:center;
  padding:18px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.045);
}
.bounty-status{

  background:rgba(255,179,77,.12);

  font-size:12px;
  font-weight:950;
  letter-spacing:.10em;
  text-transform:uppercase;

}
.bounty-week{
  display:grid;
  grid-template-columns:.88fr 1.12fr;
  gap:20px;
  align-items:stretch;
}
.bounty-week-visual{

    linear-gradient(180deg, rgba(5,3,12,.12), rgba(5,3,12,.88)),
    var(--bounty-img) center/cover no-repeat;

  overflow:hidden;
}
.bounty-week-visual::after{

.report-row{

}
.report-tile{

}
.report-tile strong{display:block;color:#fff;margin-bottom:6px}
.report-tile span{display:block;color:#ffcf8a;font-size:12px;font-weight:950;letter-spacing:.10em;text-transform:uppercase}
.grail-form-card form{

}
.grail-form-card input,.grail-form-card textarea{
  width:100%;

  border-radius:16px;

  outline:none;
}

.hof-grid{
  display:grid;

}
.hof-card{
  padding:18px;

  display:grid;

  border-radius:26px;

}
.claim-card-preview strong{
  font-size:24px;

}
@media(max-width:1100px){
  .viral-grid-3,.hof-grid,.report-row{grid-template-columns:1fr 1fr}

}

  .viral-grid-2,.viral-grid-3,.hof-grid,.report-row,.bounty-item{grid-template-columns:1fr}

/* Internal chat + unread bell */
.chat-bell-link{
  position:relative;
  display:inline-flex !important;
  align-items:center;
  gap:7px;
}
.chat-bell-count{
  min-width:18px;
  height:18px;
  padding:0 5px;
  border-radius:999px;
  display:none;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#ff2f98,#ffb34d);
  color:#fff;
  font-size:11px;
  font-weight:950;
  box-shadow:0 0 18px rgba(255,47,152,.28);
}
.chat-bell-count.show{display:inline-flex}
.chat-shell{
  display:grid;
  grid-template-columns:.86fr 1.14fr;
  gap:22px;
  align-items:start;
}
.chat-panel{
  padding:24px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,.10);
  background:
    radial-gradient(circle at 12% 0%, rgba(255,47,152,.10), transparent 34%),
    linear-gradient(180deg, rgba(16,11,28,.84), rgba(11,8,21,.66));
  box-shadow:var(--glow);
}
.conversation-list{
  display:grid;
  gap:12px;
}
.conversation-item{
  display:block;
  padding:16px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.045);
  transition:.16s ease;
}
.conversation-item:hover{
  transform:translateY(-1px);
  border-color:rgba(255,179,77,.24);
}
.conversation-item strong{
  display:block;
  color:#fff;
  font-size:18px;
  margin-bottom:5px;
}
.conversation-item small{
  display:block;
  color:#ffcf8a;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.unread-dot{
  display:inline-flex;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ffb34d;
  box-shadow:0 0 16px rgba(255,179,77,.45);
  margin-right:8px;
}
.message-thread{
  display:grid;
  gap:12px;
  max-height:560px;
  overflow:auto;
  padding-right:4px;
}
.message-bubble{
  max-width:82%;
  padding:14px 16px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.055);
}
.message-bubble.mine{
  justify-self:end;
